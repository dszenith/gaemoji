<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAVE DASH - ZENITH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        :root {
            --kawaii-pink: #fff5f8;
            --accent: #ff5c7c;
            --text: #8e7dbe;
            --obstacle-color: #4a2c7a; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--kawaii-pink);
            color: var(--text); font-family: 'Fredoka', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            user-select: none; touch-action: none;
        }

        .game-box { 
            position: relative; width: 850px; height: 480px; 
            background: white; 
            border: 8px solid white; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(74, 44, 122, 0.1); 
            overflow: hidden; 
        }

        #hud {
            position: absolute; top: 25px; width: 100%;
            display: flex; justify-content: center; gap: 60px;
            font-size: 1.6rem; color: var(--accent); font-weight: bold;
            z-index: 10; pointer-events: none;
            text-shadow: 1px 1px 0px white;
        }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; backdrop-filter: blur(8px); text-align: center;
        }

        .btn { 
            background: var(--accent); border: none; color: white; 
            padding: 15px 45px; border-radius: 25px; 
            cursor: pointer; font-family: 'Fredoka'; font-size: 1.5rem; font-weight: 700;
            box-shadow: 0 6px 0 #d93858; transition: 0.1s; 
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d93858; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div class="game-box">
        <div id="hud">
            <div>SCORE: <span id="score-val">0</span></div>
            <div>STARS: <span id="star-val">0</span></div>
        </div>
        
        <div id="start-screen" class="overlay">
            <h1 style="color:var(--accent); font-size: 3.5rem; margin-bottom: 10px;">WAVE DASH</h1>
            <p style="margin-bottom: 30px; font-size: 1.2rem;">Tieni premuto per salire, rilascia per scendere!</p>
            <button class="btn" onclick="startGame()">START ✨</button>
        </div>

        <div id="death-screen" class="overlay" style="display: none;">
            <h1 style="color:var(--accent); font-size: 3rem; margin-bottom: 5px;">OOOPS! SEI MORTO</h1>
            <p style="font-size: 1.4rem; margin-bottom: 25px;">Final Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="resetGame()">RIPROVA</button>
        </div>

        <canvas id="waveCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');
        const starVal = document.getElementById('star-val');
        const deathScreen = document.getElementById('death-screen');
        const startScreen = document.getElementById('start-screen');
        const finalScoreEl = document.getElementById('final-score');

        canvas.width = 850;
        canvas.height = 480;

        let score = 0, stars = 0, gameActive = false, isPressing = false;
        let obstacles = [], collectibles = [], particles = [];
        let worldX = 0, lastSpawnX = 600;
        let audioCtx = null;

        const wave = { x: 150, y: 240, size: 20, trail: [], angle: 0 };

        function playSfx(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'star') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1300, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'death') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        const startAction = (e) => { if(gameActive) { isPressing = true; playSfx('jump'); } };
        const endAction = (e) => { isPressing = false; };
        window.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); });
        window.addEventListener('touchend', (e) => { e.preventDefault(); endAction(); });

        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startScreen.style.display = 'none';
            resetGame();
        }

        function resetGame() {
            score = 0; stars = 0; obstacles = []; collectibles = []; particles = [];
            wave.y = 240; wave.trail = []; worldX = 0; lastSpawnX = 600;
            gameActive = true; deathScreen.style.display = 'none';
            scoreVal.innerText = "0"; starVal.innerText = "0";
            requestAnimationFrame(loop);
        }

        function spawnLevel() {
            const gap = 175;
            const h = 50 + Math.random() * (canvas.height - gap - 100);
            obstacles.push({ x: lastSpawnX, y: 0, w: 65, h: h });
            obstacles.push({ x: lastSpawnX, y: h + gap, w: 65, h: canvas.height - (h + gap) });
            if (Math.random() > 0.45) collectibles.push({ x: lastSpawnX + 18, y: h + gap/2, collected: false });
            lastSpawnX += 330; 
        }

        function update() {
            if (!gameActive) return;
            wave.y += isPressing ? -7.2 : 7.2;
            wave.angle += ((isPressing ? -Math.PI/4 : Math.PI/4) - wave.angle) * 0.22;
            if (wave.y < 0 || wave.y > canvas.height) endGame();
            wave.trail.push({ x: worldX + wave.x, y: wave.y });
            if (wave.trail.length > 35) wave.trail.shift();
            if (lastSpawnX - worldX < canvas.width + 200) spawnLevel();
            worldX += 6.2;
            obstacles.forEach(obs => {
                const ox = obs.x - worldX;
                if (wave.x + 10 > ox && wave.x - 10 < ox + obs.w &&
                    wave.y + 10 > obs.y && wave.y - 10 < obs.y + obs.h) endGame();
            });
            collectibles.forEach(s => {
                const sx = s.x - worldX;
                const dx = wave.x - sx; const dy = wave.y - s.y;
                if (!s.collected && Math.sqrt(dx*dx + dy*dy) < 28) {
                    s.collected = true; stars++; starVal.innerText = stars;
                    playSfx('star');
                    for(let i=0; i<12; i++) particles.push({ x: wave.x, y: wave.y, vx: (Math.random()-0.5)*11, vy: (Math.random()-0.5)*11, life: 1, c: '#FFD700' });
                }
            });
            score++; scoreVal.innerText = Math.floor(score / 10);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (wave.trail.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255, 92, 124, 0.45)";
                ctx.lineWidth = 9; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                for(let i=0; i<wave.trail.length; i++) {
                    const tx = wave.trail[i].x - worldX;
                    if (i === 0) ctx.moveTo(tx, wave.trail[i].y);
                    else ctx.lineTo(tx, wave.trail[i].y);
                }
                ctx.stroke();
            }
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--obstacle-color');
            obstacles.forEach(o => {
                const ox = o.x - worldX;
                ctx.beginPath(); ctx.roundRect(ox, o.y, o.w, o.h, 12); ctx.fill();
            });
            collectibles.forEach(s => {
                if (!s.collected) {
                    ctx.fillStyle = "#FFD700";
                    let rot = Math.PI/2*3, step=Math.PI/5;
                    ctx.beginPath(); ctx.moveTo(s.x-worldX, s.y-14);
                    for(let i=0; i<5; i++){
                        ctx.lineTo(s.x-worldX+Math.cos(rot)*14, s.y+Math.sin(rot)*14); rot+=step;
                        ctx.lineTo(s.x-worldX+Math.cos(rot)*7, s.y+Math.sin(rot)*7); rot+=step;
                    }
                    ctx.closePath(); ctx.fill();
                }
            });
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                ctx.fillStyle = `rgba(255, 215, 0, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.save();
            ctx.translate(wave.x, wave.y); ctx.rotate(wave.angle);
            ctx.fillStyle = '#ff5c7c'; ctx.beginPath();
            ctx.moveTo(22, 0); ctx.lineTo(-16, -19); ctx.lineTo(-16, 19); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-2, 0, 4.5, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function endGame() {
            if (!gameActive) return;
            gameActive = false; playSfx('death');
            finalScoreEl.innerText = Math.floor(score / 10) + (stars * 75);
            deathScreen.style.display = 'flex';
        }

        function loop() { update(); draw(); if (gameActive) requestAnimationFrame(loop); }
    </script>
</body>
</html>
