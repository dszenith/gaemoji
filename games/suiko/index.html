<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #fff5f5; font-family: 'Fredoka', sans-serif;
            touch-action: none;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }

        .stat-card {
            background: white; padding: 10px 20px; border-radius: 20px;
            border: 4px solid #ffcfcf; text-align: center; pointer-events: auto;
        }

        #game-container { width: 100%; height: 100%; position: relative; }

        .line {
            position: absolute; top: 120px; left: 0; width: 100%; height: 2px;
            background: repeating-linear-gradient(90deg, #ff5c7c, #ff5c7c 10px, transparent 10px, transparent 20px);
            opacity: 0.5; pointer-events: none;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(10px);
        }

        .btn {
            background: #ff5c7c; color: white; border: none; padding: 15px 40px;
            font-size: 1.5rem; border-radius: 50px; cursor: pointer; font-family: 'Fredoka';
            box-shadow: 0 5px 0 #d93858; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-card">
            <div style="color: #ff5c7c; font-size: 0.8rem;">PUNTI</div>
            <div id="score" style="font-size: 1.5rem; font-weight: bold;">0</div>
        </div>
        <div class="stat-card">
            <div style="color: #ff5c7c; font-size: 0.8rem;">PROSSIMO</div>
            <div id="next-emoji" style="font-size: 1.5rem;">🍓</div>
        </div>
    </div>

    <div id="game-container">
        <div class="line"></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 style="color:#ff5c7c; font-size: 3rem;">SUIKA ZENITH</h1>
        <button class="btn" onclick="startGame()">GIOCA</button>
    </div>

    <div id="game-over" class="overlay" style="display: none;">
        <h1 style="color:#ff5c7c; font-size: 4rem;">BOOM! 💥</h1>
        <button class="btn" onclick="location.reload()">RIPROVA</button>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const FRUITS = [
            { r: 20, s: 2, e: '🍒' }, { r: 30, s: 4, e: '🍓' }, { r: 40, s: 8, e: '🍇' }, 
            { r: 50, s: 16, e: '🍊' }, { r: 65, s: 32, e: '🍅' }, { r: 80, s: 64, e: '🍎' },
            { r: 95, s: 128, e: '🍐' }, { r: 110, s: 256, e: '🍑' }, { r: 125, s: 512, e: '🍍' }
        ];

        let engine, render, runner, currentFruit = null;
        let score = 0, nextIdx = 0, isDropping = false, gameActive = false;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            init();
        }

        function init() {
            engine = Engine.create({ gravity: { y: 1.5 } });
            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // Muri
            const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 30, window.innerWidth, 60, { isStatic: true });
            const leftWall = Bodies.rectangle(-30, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
            const rightWall = Bodies.rectangle(window.innerWidth + 30, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
            Composite.add(engine.world, [ground, leftWall, rightWall]);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            spawnFruit();

            // Collisioni
            Events.on(engine, 'collisionStart', (event) => {
                event.pairs.forEach(pair => {
                    const a = pair.bodyA;
                    const b = pair.bodyB;
                    if (a.lvl !== undefined && a.lvl === b.lvl && !a.merged && !b.merged) {
                        a.merged = b.merged = true;
                        const newLvl = a.lvl + 1;
                        if (newLvl < FRUITS.length) {
                            const newX = (a.position.x + b.position.x) / 2;
                            const newY = (a.position.y + b.position.y) / 2;
                            score += FRUITS[newLvl].s;
                            document.getElementById('score').innerText = score;
                            Composite.remove(engine.world, [a, b]);
                            createFruit(newX, newY, newLvl, true);
                        }
                    }
                });
            });

            // Disegno Emoji e Check Game Over
            Events.on(render, 'afterRender', () => {
                const ctx = render.context;
                Composite.allBodies(engine.world).forEach(body => {
                    if (body.lvl !== undefined) {
                        ctx.save();
                        ctx.translate(body.position.x, body.position.y);
                        ctx.rotate(body.angle);
                        ctx.font = `${FRUITS[body.lvl].r * 2.2}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(FRUITS[body.lvl].e, 0, 0);
                        ctx.restore();

                        // GAME OVER LOGIC: solo se il frutto è già caduto e sta sopra la linea
                        if (body.isDropped && body.position.y < 120 && Math.abs(body.velocity.y) < 0.1) {
                            gameOver();
                        }
                    }
                });
            });

            // Input
            window.addEventListener('pointermove', (e) => {
                if (!isDropping && currentFruit) {
                    let x = e.clientX;
                    const r = FRUITS[currentFruit.lvl].r;
                    x = Math.max(r, Math.min(window.innerWidth - r, x));
                    Body.setPosition(currentFruit, { x: x, y: 60 });
                }
            });

            window.addEventListener('pointerup', () => {
                if (!isDropping && currentFruit) {
                    isDropping = true;
                    Body.setStatic(currentFruit, false);
                    currentFruit.isDropped = true; // Diventa "attivo" per il game over solo dopo il lancio
                    setTimeout(spawnFruit, 1000);
                }
            });
        }

        function createFruit(x, y, lvl, isDropped) {
            const f = FRUITS[lvl];
            const fruit = Bodies.circle(x, y, f.r, {
                restitution: 0.3,
                friction: 0.1,
                render: { visible: false }
            });
            fruit.lvl = lvl;
            fruit.isDropped = isDropped;
            Composite.add(engine.world, fruit);
            return fruit;
        }

        function spawnFruit() {
            if (!gameActive) return;
            isDropping = false;
            const lvl = nextIdx;
            nextIdx = Math.floor(Math.random() * 4);
            document.getElementById('next-emoji').innerText = FRUITS[nextIdx].e;
            
            currentFruit = createFruit(window.innerWidth / 2, 60, lvl, false);
            Body.setStatic(currentFruit, true);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'flex';
        }
    </script>
</body>
</html>
