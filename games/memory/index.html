<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Memory - ZENITH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

        :root {
            --bg: #fff5f5;
            --primary: #ff5c7c;
            --secondary: #8e7dbe;
            --accent: #ffcfcf;
            --card-back: #8e7dbe;
        }

        /* Ottimizzazione Touch */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

        body {
            margin: 0; padding: 20px;
            background: var(--bg);
            font-family: 'Fredoka', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .stats {
            margin-bottom: 25px;
            display: flex; gap: 20px;
            color: var(--secondary);
            font-size: 1.3rem; font-weight: bold;
            background: white; padding: 10px 20px; border-radius: 20px;
            border: 3px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 480px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
            border: 5px solid white;
            outline: 3px solid var(--accent);
        }

        .card-back {
            background: var(--card-back);
            border: 5px solid white;
        }

        .card-back::after {
            content: '?';
            color: rgba(255,255,255,0.4);
            font-size: 2.5rem; font-weight: bold;
        }

        /* Animazione Match Corretta */
        .card.matched {
            pointer-events: none;
            animation: matchAnim 0.6s ease-out forwards;
        }

        @keyframes matchAnim {
            0% { transform: rotateY(180deg) scale(1); opacity: 1; }
            40% { transform: rotateY(180deg) scale(1.15); opacity: 1; }
            100% { transform: rotateY(180deg) scale(1); opacity: 0.6; }
        }

        @media (max-width: 450px) {
            #game-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .card-face { font-size: 2rem; border-radius: 15px; }
            .stats { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="stats">
        <span>MOSSE: <span id="moves">0</span></span>
        <span>MATCH: <span id="matches">0</span>/8</span>
    </div>

    <div id="game-grid"></div>

    <script>
        const emojis = ['🍕', '🍔', '🍦', '🍩', '🥑', '🍭', '🍉', '🍓'];
        let cards = [...emojis, ...emojis];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let canFlip = true;

        const grid = document.getElementById('game-grid');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBoard() {
            grid.innerHTML = '';
            shuffle(cards).forEach((emoji) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-face card-front">${emoji}</div>
                    <div class="card-face card-back"></div>
                `;
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                canFlip = false;
                moves++;
                movesDisplay.innerText = moves;
                // Aspetta che la seconda carta finisca di girarsi prima di controllare
                setTimeout(checkMatch, 500);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matches++;
                matchesDisplay.innerText = matches;
                flippedCards = [];
                canFlip = true;

                if (matches === 8) {
                    setTimeout(() => alert('GRANDIOSO L E G E N D S!'), 300);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 700);
            }
        }

        // --- INTEGRAZIONE MOBILE READY (Ricezione messaggi dalla Main) ---
        window.addEventListener('message', (event) => {
            // Se riceve un segnale (tipo tasto ACTION/Space), resetta il gioco
            if (event.data.type === 'keydown' && event.data.keyCode === 32) {
                moves = 0; matches = 0;
                movesDisplay.innerText = "0"; matchesDisplay.innerText = "0/8";
                createBoard();
            }
        });

        createBoard();
    </script>
</body>
</html>
