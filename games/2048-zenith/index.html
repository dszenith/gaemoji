<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Zenith - Pro Mouse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        :root {
            --bg: #fff5f5;
            --grid-bg: #ffe4e4;
            --primary: #ff5c7c;
            --secondary: #8e7dbe;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            margin: 0; background: var(--bg);
            font-family: 'Fredoka', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* DASHBOARD SUPERIORE */
        .stats-container {
            display: flex; gap: 10px; margin-bottom: 15px; width: 310px;
        }

        .stat-box {
            background: white; flex: 1; padding: 10px; border-radius: 15px;
            text-align: center; border: 3px solid var(--grid-bg);
            box-shadow: 0 4px 0 var(--grid-bg);
        }

        .stat-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 2px; }
        .stat-val { font-size: 1.2rem; color: var(--primary); font-weight: 700; }
        .stat-val.alt { color: var(--secondary); }

        .game-wrapper {
            position: relative; padding: 20px; background: white;
            border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 92, 124, 0.1);
        }

        #grid-container {
            position: relative; width: 310px; height: 310px;
            background: var(--grid-bg); border-radius: 15px; overflow: hidden;
        }

        .grid-base {
            position: absolute; top: 10px; left: 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 10px; width: 290px; height: 290px; z-index: 1;
        }

        .grid-cell { background: rgba(255,255,255,0.6); border-radius: 8px; }

        #tile-layer { position: absolute; top: 10px; left: 10px; width: 290px; height: 290px; z-index: 10; }

        .tile {
            position: absolute; width: 65px; height: 65px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 700; transition: transform 0.1s ease-in-out; pointer-events: none;
        }

        .v2 { background: #ffffff; color: var(--secondary); box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .v4 { background: #e0c3fc; color: #8e7dbe; }
        .v8 { background: #c3fcf2; color: #5eb5a8; }
        .v16 { background: #ffd8a8; color: #e67e22; }
        .v32 { background: #ffcfcf; color: #ff5c7c; }
        .v64 { background: #ff5c7c; color: white; }
        .v128 { background: #8e7dbe; color: white; font-size: 1.5rem; }
        .v256 { background: #7cd6ff; color: white; box-shadow: 0 0 15px #7cd6ff; }

        .pop { animation: popScale 0.15s ease-out; }
        @keyframes popScale { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 92, 124, 0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100; border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-label">Punti</span>
            <span id="score-val" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Mosse</span>
            <span id="moves-val" class="stat-val alt">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Record</span>
            <span id="best-val" class="stat-val">0</span>
        </div>
    </div>

    <div class="game-wrapper">
        <div id="grid-container">
            <div class="grid-base">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div id="tile-layer"></div>
            <div id="game-over">
                <h2 style="font-size: 2.5rem; margin-bottom: 10px;">FINITO!</h2>
                <button onclick="reset()" style="border:none; padding:12px 30px; border-radius:20px; cursor:pointer; font-weight:bold; color:var(--primary); background: white;">REPLAY</button>
            </div>
        </div>
    </div>

    <script>
        const layer = document.getElementById('tile-layer');
        const scoreEl = document.getElementById('score-val');
        const movesEl = document.getElementById('moves-val');
        const bestEl = document.getElementById('best-val');
        const container = document.getElementById('grid-container');
        
        let board = [];
        let score = 0;
        let moves = 0;
        let startX, startY;
        
        // Carica il nome utente per la gestione record
        const playerName = localStorage.getItem('zenith_name') || 'Default';

        function loadBestScore() {
            const best = localStorage.getItem(`2048_best_${playerName}`) || 0;
            bestEl.innerText = best;
        }

        function saveBestScore() {
            const currentBest = parseInt(localStorage.getItem(`2048_best_${playerName}`) || 0);
            if (score > currentBest) {
                localStorage.setItem(`2048_best_${playerName}`, score);
                bestEl.innerText = score;
            }
        }

        function reset() {
            layer.innerHTML = '';
            board = Array(16).fill(null);
            score = 0;
            moves = 0;
            scoreEl.innerText = score;
            movesEl.innerText = moves;
            loadBestScore();
            document.getElementById('game-over').style.display = 'none';
            spawn(); spawn();
        }

        function spawn() {
            const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (!empty.length) return;
            const idx = empty[Math.floor(Math.random() * empty.length)];
            const val = Math.random() < 0.9 ? 2 : 4;
            const el = document.createElement('div');
            el.className = `tile v${val}`;
            el.innerText = val;
            const tile = { val, el, pos: idx };
            board[idx] = tile;
            layer.appendChild(el);
            updatePos(tile);
        }

        function updatePos(tile) {
            const x = tile.pos % 4;
            const y = Math.floor(tile.pos / 4);
            tile.el.style.transform = `translate(${x * 75}px, ${y * 75}px)`;
        }

        function move(dir) {
            let moved = false;
            const isVert = dir === 'up' || dir === 'down';
            const isRev = dir === 'right' || dir === 'down';

            for (let i = 0; i < 4; i++) {
                let lineIndices = [];
                for (let j = 0; j < 4; j++) {
                    lineIndices.push(isVert ? (j * 4 + i) : (i * 4 + j));
                }
                if (isRev) lineIndices.reverse();

                let lineTiles = lineIndices.map(idx => board[idx]).filter(x => x !== null);
                
                for (let k = 0; k < lineTiles.length - 1; k++) {
                    if (lineTiles[k].val === lineTiles[k+1].val) {
                        const t1 = lineTiles[k];
                        const t2 = lineTiles[k+1];
                        t1.val *= 2;
                        score += t1.val;
                        scoreEl.innerText = score;
                        saveBestScore();
                        t1.el.innerText = t1.val;
                        t1.el.className = `tile v${t1.val} pop`;
                        t2.el.remove();
                        lineTiles.splice(k+1, 1);
                        moved = true;
                    }
                }

                lineIndices.forEach((idx, k) => {
                    const newTile = lineTiles[k] || null;
                    if (board[idx] !== newTile) moved = true;
                    board[idx] = newTile;
                    if (newTile) {
                        newTile.pos = idx;
                        updatePos(newTile);
                    }
                });
            }

            if (moved) {
                moves++;
                movesEl.innerText = moves;
                setTimeout(spawn, 110);
                if (checkOver()) setTimeout(() => document.getElementById('game-over').style.display = 'flex', 400);
            }
        }

        function checkOver() {
            if (board.includes(null)) return false;
            for (let i = 0; i < 16; i++) {
                const v = board[i].val;
                if (i % 4 < 3 && board[i+1] && board[i+1].val === v) return false;
                if (i < 12 && board[i+4] && board[i+4].val === v) return false;
            }
            return true;
        }

        container.addEventListener('mousedown', e => { startX = e.clientX; startY = e.clientY; });
        window.addEventListener('mouseup', e => {
            if (startX === undefined) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            startX = undefined;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
            if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
        });

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        reset();
    </script>
</body>
</html>
