<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        body, html { margin: 0; padding: 0; background: transparent; font-family: 'Fredoka', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #snake-layout { display: flex; gap: 20px; align-items: flex-start; max-width: 95vw; }
        .game-box { 
            position: relative; width: 400px; height: 500px; 
            background: #fff5f5; border: 10px solid white; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; 
        }
        
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .side-card { background: white; padding: 15px; border-radius: 20px; text-align: center; border: 4px solid #ffcfcf; min-width: 120px; box-shadow: 0 8px 0px #ffcfcf; }
        .side-val { font-size: 2.2rem; color: #ff5c7c; font-weight: bold; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); text-align: center; }
        .btn { background: #ff5c7c; border: none; color: white; padding: 12px 35px; font-weight: bold; border-radius: 25px; cursor: pointer; font-family: 'Fredoka'; font-size: 1.2rem; box-shadow: 0 5px 0 #d93858; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d93858; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="snake-layout">
        <div class="game-box">
            <canvas id="s" width="400" height="500"></canvas>
            
            <div id="start-screen" class="overlay">
                <div style="font-size: 5rem; margin-bottom: 10px;">🐍</div>
                <h1 style="color:#ff5c7c; margin:0; font-size: 2.5rem;">ZENITH SNAKE</h1>
                <p style="color:#8e7dbe; margin-bottom: 25px; padding: 0 20px;">Usa le frecce per mangiare le mele!</p>
                <button class="btn" onclick="startGame()">START</button>
            </div>

            <div id="over" class="overlay hidden">
                <h1 style="color:#ff5c7c; font-size: 3rem; margin:0;">BOOM! 💥</h1>
                <div id="final-score" style="font-size: 2.2rem; margin-bottom: 25px; font-weight: bold; color: #8e7dbe;">0</div>
                <button class="btn" onclick="location.reload()">RIPROVA ✨</button>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="side-card">
                <div style="color: #ff8fa3; font-size: 0.8rem; font-weight: bold;">SCORE</div>
                <div id="sc" class="side-val">0</div>
            </div>
            <div class="side-card">
                <div style="color: #ff8fa3; font-size: 0.8rem; font-weight: bold;">SPEED</div>
                <div id="sp" class="side-val">1</div>
            </div>
        </div>
    </div>

    <script>
        const c = document.getElementById('s'), ctx = c.getContext('2d');
        const grid = 20;
        const cols = c.width / grid;
        const rows = c.height / grid;

        let snake = [{x: grid * 10, y: grid * 12}, {x: grid * 9, y: grid * 12}, {x: grid * 8, y: grid * 12}];
        let dx = grid, dy = 0, nextDx = grid, nextDy = 0;
        let food = {x: grid * 5, y: grid * 5};
        let score = 0, currentSpeed = 150, gameActive = false;
        let particles = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, decay=0.15) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq*0.1, audioCtx.currentTime + decay);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + decay);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + decay);
        }

        function spawnFood() {
            food.x = (Math.floor(Math.random() * (cols - 4)) + 2) * grid;
            food.y = (Math.floor(Math.random() * (rows - 4)) + 2) * grid;
        }

        function createStars(x, y) {
            for(let i=0; i<10; i++) {
                particles.push({ 
                    x, y, 
                    vx: (Math.random()-0.5)*14, 
                    vy: (Math.random()-0.5)*14 - 2, 
                    alpha: 1, 
                    size: 6 + Math.random()*8, 
                    rot: Math.random()*Math.PI 
                });
            }
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI/2*3, x, y, step = Math.PI/spikes;
            ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
            for (let i=0; i<spikes; i++) {
                x = cx + Math.cos(rot)*outerRadius; y = cy + Math.sin(rot)*outerRadius; ctx.lineTo(x,y); rot += step;
                x = cx + Math.cos(rot)*innerRadius; y = cy + Math.sin(rot)*innerRadius; ctx.lineTo(x,y); rot += step;
            }
            ctx.closePath();
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameActive = true;
            spawnFood();
            gameLoop();
            render();
        }

        function gameLoop() {
            if(!gameActive) return;
            dx = nextDx; dy = nextDy;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if(head.x < 0 || head.x >= c.width || head.y < 0 || head.y >= c.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                gameActive = false;
                playNote(100, 0.4);
                document.getElementById('over').classList.remove('hidden');
                document.getElementById('final-score').innerText = score + " PUNTI";
                return;
            }

            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('sc').innerText = score;
                playNote(400 + (score*2), 0.2);
                createStars(head.x + grid/2, head.y + grid/2);
                spawnFood();
                if(currentSpeed > 60) currentSpeed -= 4;
                document.getElementById('sp').innerText = Math.floor((150 - currentSpeed)/5) + 1;
            } else {
                snake.pop();
            }
            setTimeout(gameLoop, currentSpeed);
        }

        function render() {
            if(!gameActive && document.getElementById('over').classList.contains('hidden')) return;
            ctx.clearRect(0, 0, c.width, c.height);
            
            // Grid background
            ctx.strokeStyle = '#ffeeef'; ctx.lineWidth = 1;
            for(let i=0; i<=c.width; i+=grid) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,c.height); ctx.stroke(); }
            for(let j=0; j<=c.height; j+=grid) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(c.width,j); ctx.stroke(); }

            // Mela con bagliore
            ctx.fillStyle = '#ff5c7c'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff5c7c';
            ctx.beginPath(); ctx.arc(food.x + grid/2, food.y + grid/2, 8, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Snake animato
            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? '#8e7dbe' : '#e0c3fc';
                const s = i === 0 ? grid - 2 : grid - 4;
                const offset = (grid - s) / 2;
                ctx.beginPath();
                ctx.roundRect(p.x + offset, p.y + offset, s, s, i === 0 ? 6 : 4);
                ctx.fill();

                if (i === 0) { // Occhi della testa
                    ctx.save(); ctx.translate(p.x + grid/2, p.y + grid/2);
                    let angle = dx === grid ? 0 : dx === -grid ? Math.PI : dy === -grid ? -Math.PI/2 : Math.PI/2;
                    ctx.rotate(angle); ctx.fillStyle = 'white';
                    ctx.fillRect(3, -5, 4, 4); ctx.fillRect(3, 1, 4, 4);
                    ctx.restore();
                }
            });

            // Particelle "Juicy"
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.alpha -= 0.02; p.rot += 0.1;
                if(p.alpha <= 0) { particles.splice(i, 1); return; }
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.shadowBlur = 8; ctx.shadowColor = "white";
                drawStar(ctx, 0, 0, 5, p.size, p.size/2); ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(render);
        }

        window.onkeydown = e => {
            if(e.code === 'Space' && !gameActive) location.reload();
            if(!gameActive) return;
            if(e.key === 'ArrowUp' && dy === 0) { nextDx = 0; nextDy = -grid; }
            if(e.key === 'ArrowDown' && dy === 0) { nextDx = 0; nextDy = grid; }
            if(e.key === 'ArrowLeft' && dx === 0) { nextDx = -grid; nextDy = 0; }
            if(e.key === 'ArrowRight' && dx === 0) { nextDx = grid; nextDy = 0; }
        };
    </script>
</body>
</html>
