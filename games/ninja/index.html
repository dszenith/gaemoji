<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

        body, html { margin: 0; padding: 0; background: transparent; font-family: 'Fredoka', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; cursor: crosshair; }

        

        #game-container { position: relative; width: 800px; height: 600px; background: #fff5f5; border: 10px solid white; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; }

        canvas { display: block; background: transparent; position: absolute; top:0; left:0; }


        .hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: flex-end; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 100; gap: 20px; }

        .score-box { background: white; padding: 10px 25px; border-radius: 20px; border: 4px solid #ffcfcf; color: #ff5c7c; font-size: 2rem; font-weight: bold; box-shadow: 0 5px 0 #ffcfcf; }

        .lives { font-size: 2.2rem; filter: drop-shadow(2px 2px 0px white); }


        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background: white; opacity: 0; pointer-events: none; z-index: 200; }

        

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 300; backdrop-filter: blur(10px); text-align: center; }

        .btn { background: #ff5c7c; border: none; color: white; padding: 15px 40px; font-weight: bold; border-radius: 25px; cursor: pointer; font-size: 1.3rem; box-shadow: 0 5px 0 #d93858; }

        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d93858; }

        .hidden { display: none !important; }

    </style>

</head>

<body>


    <div id="game-container">

        <div id="flash"></div>

        

        <div class="hud">

            <div class="score-box" id="score-val">0</div>

            <div id="lives-box" class="lives">❤️❤️❤️</div>

        </div>


        <canvas id="bgCanvas"></canvas>

        <canvas id="fgCanvas"></canvas>


        <div id="start-screen" class="overlay">

            <div style="font-size: 6rem; margin-bottom: 30px;">🥷</div>

            <button class="btn" onclick="startGame()">TAGLIA ✨</button>

        </div>


        <div id="game-over" class="overlay hidden">

            <h1 style="color:#ff5c7c; font-size: 3.5rem; margin:0;">GAME OVER! 💀</h1>

            <div id="final-score" style="font-size: 2.5rem; margin: 20px 0 30px; color: #8e7dbe;">0</div>

            <button class="btn" onclick="location.reload()">RIPROVA</button>

        </div>

    </div>


    <script>

        const bgCanvas = document.getElementById('bgCanvas'), bgCtx = bgCanvas.getContext('2d');

        const fgCanvas = document.getElementById('fgCanvas'), fgCtx = fgCanvas.getContext('2d');

        const container = document.getElementById('game-container'), flash = document.getElementById('flash');

        [bgCanvas, fgCanvas].forEach(c => { c.width = 800; c.height = 600; });


        let score = 0, lives = 3, gameActive = false;

        let fruits = [], particles = [], halves = [], splashes = [], slashPoints = [];

        const gravity = 0.3;


        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();


        function playSliceSound() {

            if(audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();

            const g = audioCtx.createGain();

            osc.type = 'triangle';

            osc.frequency.setValueAtTime(1200, now);

            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);

            g.gain.setValueAtTime(0.3, now);

            g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc.connect(g); g.connect(audioCtx.destination);

            osc.start(); osc.stop(now + 0.15);

        }


        function playBombSound() {

            if(audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();

            osc.type = 'sine';

            osc.frequency.setValueAtTime(150, now);

            osc.frequency.linearRampToValueAtTime(40, now + 0.4);

            g.gain.setValueAtTime(0.5, now);

            g.gain.linearRampToValueAtTime(0, now + 0.4);

            osc.connect(g); g.connect(audioCtx.destination);

            osc.start(); osc.stop(now + 0.4);

        }


        const FRUITS_DATA = [

            { e: '🍉', c: '#4caf50' }, { e: '🍎', c: '#f44336' }, { e: '🍊', c: '#ff9800' }, 

            { e: '🍍', c: '#ffeb3b' }, { e: '🍓', c: '#e91e63' }, { e: '🍇', c: '#9c27b0' }

        ];


        class Fruit {

            constructor(isBomb = false) {

                this.isBomb = isBomb;

                let f = FRUITS_DATA[Math.floor(Math.random()*FRUITS_DATA.length)];

                this.e = isBomb ? '💣' : f.e;

                this.c = isBomb ? '#333' : f.c;

                this.x = Math.random() * 600 + 100;

                this.y = 650;

                this.vx = (this.x < 400 ? 1 : -1) * (Math.random() * 2 + 2);

                this.vy = -(Math.random() * 3 + 14);

                this.rot = 0; this.vr = (Math.random()-0.5)*0.1;

                this.sliced = false;

            }

            update() {

                this.x += this.vx; this.y += this.vy; this.vy += gravity; this.rot += this.vr;

                return this.y < 700;

            }

            draw(ctx) {

                if(this.sliced) return;

                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);

                ctx.font = "65px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";

                ctx.fillText(this.e, 0, 0); ctx.restore();

            }

        }


        class Half {

            constructor(x, y, vx, vy, rot, vr, e, side) {

                this.x = x; this.y = y; this.vx = vx + (side === 'l' ? -2 : 2);

                this.vy = vy; this.rot = rot; this.vr = vr + (side === 'l' ? -0.1 : 0.1);

                this.e = e; this.side = side; this.alpha = 1;

            }

            update() {

                this.x += this.vx; this.y += this.vy; this.vy += gravity;

                this.rot += this.vr; this.alpha -= 0.015; return this.alpha > 0;

            }

            draw(ctx) {

                ctx.save(); ctx.globalAlpha = this.alpha;

                ctx.translate(this.x, this.y); ctx.rotate(this.rot);

                ctx.font = "65px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";

                ctx.beginPath();

                if(this.side === 'l') ctx.rect(-100, -100, 100, 200);

                else ctx.rect(0, -100, 100, 200);

                ctx.clip();

                ctx.fillText(this.e, 0, 0); ctx.restore();

            }

        }


        function createSplash(x, y, color) {

            for(let i=0; i<5; i++) {

                splashes.push({

                    x: x + (Math.random()-0.5)*60, y: y + (Math.random()-0.5)*60,

                    r: Math.random()*30 + 15, c: color, a: 0.5, vy: Math.random()*0.4

                });

            }

        }


        function triggerFlash(color = "white") {

            flash.style.background = color;

            flash.style.opacity = "0.5";

            setTimeout(() => flash.style.opacity = "0", 150);

        }


        function startGame() {

            document.getElementById('start-screen').classList.add('hidden');

            gameActive = true; loop();

            setInterval(() => { if(gameActive) fruits.push(new Fruit(Math.random() < 0.15)); }, 1000);

        }


        function handleSlice(e) {

            if(!gameActive) return;

            const rect = fgCanvas.getBoundingClientRect();

            const x = e.clientX - rect.left, y = e.clientY - rect.top;

            slashPoints.push({x, y, t: Date.now()});

            if(slashPoints.length > 8) slashPoints.shift();


            fruits.forEach(f => {

                if(!f.sliced && Math.hypot(f.x - x, f.y - y) < 45) {

                    f.sliced = true;

                    if(f.isBomb) {

                        lives--; 

                        playBombSound();

                        triggerFlash("#ff5c7c");

                        container.style.transform = "scale(1.05)";

                        setTimeout(() => container.style.transform = "scale(1)", 100);

                        if(lives <= 0) gameOver();

                    } else {

                        score += 10;

                        playSliceSound();

                        triggerFlash("white");

                        createSplash(f.x, f.y, f.c);

                        halves.push(new Half(f.x, f.y, f.vx, f.vy, f.rot, f.vr, f.e, 'l'));

                        halves.push(new Half(f.x, f.y, f.vx, f.vy, f.rot, f.vr, f.e, 'r'));

                        for(let i=0; i<12; i++) particles.push({x:f.x, y:f.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, c:f.c, a:1, r:Math.random()*4+2});

                    }

                    document.getElementById('score-val').innerText = score;

                    document.getElementById('lives-box').innerText = '❤️'.repeat(lives > 0 ? lives : 0);

                }

            });

        }


        function gameOver() {

            gameActive = false;

            document.getElementById('game-over').classList.remove('hidden');

            document.getElementById('final-score').innerText = score + " PUNTI";

        }


        function loop() {

            if(!gameActive && halves.length === 0) return;

            fgCtx.clearRect(0,0,800,600);

            

            bgCtx.clearRect(0,0,800,600);

            splashes = splashes.filter(s => {

                s.y += s.vy; s.a -= 0.002;

                bgCtx.globalAlpha = s.a; bgCtx.fillStyle = s.c;

                bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); bgCtx.fill();

                return s.a > 0.1;

            });


            if(slashPoints.length > 1) {

                fgCtx.strokeStyle = "rgba(255,255,255,0.8)"; fgCtx.lineWidth = 5; fgCtx.lineCap = "round";

                fgCtx.beginPath(); fgCtx.moveTo(slashPoints[0].x, slashPoints[0].y);

                slashPoints.forEach(p => fgCtx.lineTo(p.x, p.y)); fgCtx.stroke();

            }


            fruits = fruits.filter(f => {

                let a = f.update(); f.draw(fgCtx);

                if(!a && !f.sliced && !f.isBomb) { 

                    lives--; 

                    document.getElementById('lives-box').innerText = '❤️'.repeat(lives > 0 ? lives : 0); 

                    if(lives <= 0) gameOver(); 

                }

                return a;

            });


            halves = halves.filter(h => {

                let a = h.update(); h.draw(fgCtx);

                return a;

            });


            particles = particles.filter(p => {

                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.a -= 0.03;

                fgCtx.globalAlpha = p.a; fgCtx.fillStyle = p.c;

                fgCtx.beginPath(); fgCtx.arc(p.x, p.y, p.r, 0, 7); fgCtx.fill();

                return p.a > 0;

            });


            fgCtx.globalAlpha = 1;

            requestAnimationFrame(loop);

        }


        fgCanvas.addEventListener('mousemove', handleSlice);

        setInterval(() => { slashPoints = slashPoints.filter(p => Date.now() - p.t < 100); }, 30);

    </script>

</body>

</html>
