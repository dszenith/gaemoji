<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        :root {
            --bg-pastel: #fff5f5;
            --p1-color: #ff5c7c;
            --p2-color: #8e7dbe;
        }

        body, html { margin: 0; padding: 0; background: transparent; font-family: 'Fredoka', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #game-container { 
            position: relative; width: 800px; height: 600px; 
            background: var(--bg-pastel); 
            border: 10px solid white; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            overflow: hidden; 
        }
        canvas { display: block; }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 300; backdrop-filter: blur(8px); text-align: center; 
        }
        
        .btn { 
            background: #ff5c7c; border: none; color: white; 
            padding: 15px 40px; font-weight: bold; border-radius: 25px; 
            cursor: pointer; font-size: 1.3rem; box-shadow: 0 5px 0 #d93858; 
            font-family: 'Fredoka'; 
        }

        .laps-hud {
            position: absolute; top: 25px; right: 25px;
            display: flex; gap: 15px; z-index: 100;
        }
        .lap-box {
            background: white; padding: 8px 20px; border-radius: 15px;
            border: 3px solid #ffcfcf; font-weight: bold; font-size: 1.1rem;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="laps-hud">
            <div class="lap-box" style="color: var(--p1-color)" id="p1-laps">P1: 0/3</div>
            <div class="lap-box" style="color: var(--p2-color)" id="p2-laps">P2: 0/3</div>
        </div>

        <canvas id="raceCanvas"></canvas>

        <div id="start-screen" class="overlay">
            <h1 style="color:#ff5c7c; font-size: 3rem; margin:0;">RACERS</h1>
            <p style="color:#8e7dbe; font-weight:bold;">PLAYER UNO: WASD |  PLAYER 2: FRECCETTE</p>
            <button class="btn" onclick="startGame()">VIA! ✨</button>
        </div>

        <div id="win-screen" class="overlay hidden">
            <h1 id="winner-text" style="color:#ff5c7c; font-size: 3.5rem;">P1 VINCE! 🏆</h1>
            <button class="btn" onclick="location.reload()">RIGIOCA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;

        let gameActive = false;
        const keys = {};

        const trackRect = { x: 100, y: 100, w: 600, h: 400 };
        const innerRect = { x: 220, y: 220, w: 360, h: 160 };

        class Car {
            constructor(x, y, color, controls) {
                this.x = x; this.y = y; this.color = color; this.controls = controls;
                this.angle = 0; 
                this.speed = 0; 
                this.maxSpeed = 5.5;
                this.accel = 0.18; 
                this.friction = 0.97;
                
                // Variabili per la sterzata fluida
                this.steerAngle = 0;
                this.maxSteer = 0.07; 
                this.steerSpeed = 0.005; // Velocità di accumulo sterzata

                this.laps = 0;
                this.hasPassedHalfway = false;
                this.trail = [];
            }

            update() {
                // Accelerazione e Freno
                if (keys[this.controls.up]) this.speed += this.accel;
                if (keys[this.controls.down]) this.speed -= this.accel * 0.6;
                this.speed *= this.friction;

                // Limite velocità
                if(this.speed > this.maxSpeed) this.speed = this.maxSpeed;
                if(this.speed < -this.maxSpeed/2) this.speed = -this.maxSpeed/2;

                // CURVA DI RISPOSTA ESPONENZIALE
                // Calcoliamo quanto stiamo sterzando
                let targetSteer = 0;
                if (keys[this.controls.left]) targetSteer = -this.maxSteer;
                if (keys[this.controls.right]) targetSteer = this.maxSteer;

                // Transizione fluida verso il target di sterzata (Linear Interpolation)
                // Questo crea la sensazione di sterzata non scattosa
                this.steerAngle += (targetSteer - this.steerAngle) * 0.15;

                // Applichiamo la sterzata solo se la macchina si muove
                if (Math.abs(this.speed) > 0.2) {
                    const direction = this.speed > 0 ? 1 : -1;
                    // Più vai veloce, più la sterzata è "pesante" (fisica realistica)
                    const speedFactor = Math.min(1, Math.abs(this.speed) / 2);
                    this.angle += this.steerAngle * direction * speedFactor;
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Scia
                this.trail.push({x: this.x, y: this.y});
                if(this.trail.length > 15) this.trail.shift();

                // Checkpoints e Laps
                if (this.y > 400) this.hasPassedHalfway = true;
                if (this.x > 390 && this.x < 410 && this.y < 220) {
                    if (this.hasPassedHalfway) {
                        this.laps++;
                        this.hasPassedHalfway = false;
                        updateHUD();
                        if(this.laps >= 3) endGame(this.color === '#ff5c7c' ? 'P1' : 'P2');
                    }
                }

                // Collisioni bordi
                if (this.x < trackRect.x || this.x > trackRect.x + trackRect.w || 
                    this.y < trackRect.y || this.y > trackRect.y + trackRect.h ||
                    (this.x > innerRect.x && this.x < innerRect.x + innerRect.w && 
                     this.y > innerRect.y && this.y < innerRect.y + innerRect.h)) {
                    this.speed *= 0.85;
                }
            }

            draw() {
                // Scia fluida
                ctx.beginPath(); ctx.strokeStyle = this.color; ctx.lineWidth = 6;
                ctx.lineCap = 'round'; ctx.globalAlpha = 0.15;
                this.trail.forEach((p, i) => { if(i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
                ctx.stroke(); ctx.globalAlpha = 1.0;

                ctx.save();
                ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                
                // Ombra macchina
                ctx.fillStyle = "rgba(0,0,0,0.05)";
                ctx.beginPath(); ctx.roundRect(-13, -8, 30, 20, 5); ctx.fill();

                // Corpo macchina
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.roundRect(-15, -10, 30, 20, 6); ctx.fill();
                
                // Parabrezza
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.beginPath(); ctx.roundRect(4, -7, 8, 14, 2); ctx.fill();
                
                ctx.restore();
            }
        }

        const p1 = new Car(350, 130, '#ff5c7c', {up:'w', down:'s', left:'a', right:'d'});
        const p2 = new Car(350, 180, '#8e7dbe', {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'});

        function drawTrack() {
            ctx.fillStyle = "#fff5f5"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "#fce4ec";
            ctx.beginPath(); ctx.roundRect(trackRect.x, trackRect.y, trackRect.w, trackRect.h, 40); ctx.fill();
            ctx.strokeStyle = "#c3fcf2"; ctx.lineWidth = 12; ctx.stroke();
            ctx.fillStyle = "#fff5f5";
            ctx.beginPath(); ctx.roundRect(innerRect.x, innerRect.y, innerRect.w, innerRect.h, 25); ctx.fill();
            ctx.stroke();

            // Linea Traguardo
            for(let i=0; i<6; i++) {
                ctx.fillStyle = i % 2 === 0 ? "white" : "#ffcfcf";
                ctx.fillRect(395, 100 + (i*20), 10, 20);
            }
        }

        function updateHUD() {
            document.getElementById('p1-laps').innerText = `P1: ${p1.laps}/3`;
            document.getElementById('p2-laps').innerText = `P2: ${p2.laps}/3`;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameActive = true; loop();
        }

        function endGame(winner) {
            gameActive = false;
            document.getElementById('winner-text').innerText = winner + " VINCE! 🏆";
            document.getElementById('win-screen').classList.remove('hidden');
        }

        function loop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTrack();
            p1.update(); p1.draw();
            p2.update(); p2.draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
