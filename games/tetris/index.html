<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
        
        body, html { margin: 0; padding: 0; background: transparent; font-family: 'Fredoka', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #game-layout { display: flex; gap: 20px; align-items: flex-start; position: relative; }

        .game-box { 
            position: relative; width: 320px; height: 600px; 
            background: #fff5f5; border: 10px solid white; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { display: block; background: rgba(255, 255, 255, 0.3); border-radius: 10px; }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .side-card { 
            background: white; padding: 15px; border-radius: 20px; text-align: center; 
            border: 4px solid #ffcfcf; min-width: 120px; box-shadow: 0 8px 0px #ffcfcf;
        }
        .side-val { font-size: 1.8rem; color: #ff5c7c; font-weight: bold; }
        .next-preview { width: 80px; height: 80px; margin: 10px auto; display: flex; justify-content: center; align-items: center; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 300; backdrop-filter: blur(10px); text-align: center; }
        .btn { background: #ff5c7c; border: none; color: white; padding: 12px 30px; font-weight: bold; border-radius: 20px; cursor: pointer; font-family: 'Fredoka'; box-shadow: 0 5px 0 #d93858; font-size: 1.1rem; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #d93858; }
        .hidden { display: none !important; }
        
        #particles-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="game-layout">
        <div class="game-box">
            <canvas id="tetris" width="300" height="580"></canvas>
            <canvas id="particles-canvas" width="320" height="600"></canvas>

            <div id="start-screen" class="overlay">
                <div style="font-size: 4rem; margin-bottom: 10px;">🧱</div>
                <h1 style="color:#ff5c7c; margin:0;">ZENITH TETRIS</h1>
                <p style="color:#8e7dbe; margin-bottom: 20px; padding: 0 20px;">Usa le frecce per muovere e ruotare</p>
                <button class="btn" onclick="resetGame()">GIOCA!</button>
            </div>

            <div id="over" class="overlay hidden">
                <h1 style="color:#ff5c7c; font-size: 2.5rem; margin:0;">GAME OVER</h1>
                <div id="final-score" style="font-size: 1.8rem; margin-bottom: 20px; color: #8e7dbe;">0</div>
                <button class="btn" onclick="resetGame()">RIPROVA ✨</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="side-card">
                <div style="color: #ff8fa3; font-size: 0.8rem; font-weight: bold;">NEXT</div>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <div class="side-card">
                <div style="color: #ff8fa3; font-size: 0.8rem; font-weight: bold;">SCORE</div>
                <div id="sc" class="side-val">0</div>
            </div>
            <div class="side-card">
                <div style="color: #ff8fa3; font-size: 0.8rem; font-weight: bold;">LEVEL</div>
                <div id="lv" class="side-val">1</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextCtx = nextCanvas.getContext('2d');
        const pCanvas = document.getElementById('particles-canvas');
        const pCtx = pCanvas.getContext('2d');

        const grid = 28;
        const cols = 10;
        const rows = 20;

        const colors = [
            null,
            '#ff5c7c', // Z
            '#8e7dbe', // S
            '#ff9f43', // T
            '#48dbfb', // O
            '#1dd1a1', // L
            '#feca57', // J
            '#ff6b6b'  // I
        ];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        // Effetto Zenith: Bordi arrotondati e shadow
                        ctx.beginPath();
                        ctx.roundRect((x + offset.x) * grid, (y + offset.y) * grid, grid - 2, grid - 2, 6);
                        ctx.fill();
                        ctx.strokeStyle = "rgba(255,255,255,0.5)";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });
            });
        }

        function createArena(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
                createExplosion(y);
            }
            updateScore();
        }

        let particles = [];
        function createExplosion(yRow) {
            for(let i=0; i<30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: yRow * grid,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    alpha: 1,
                    color: colors[Math.floor(Math.random() * (colors.length - 1)) + 1]
                });
            }
        }

        function updateParticles() {
            pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if(p.alpha <= 0) particles.splice(i, 1);
                pCtx.globalAlpha = p.alpha;
                pCtx.fillStyle = p.color;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, 4, 0, Math.PI*2); pCtx.fill();
            });
        }

        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, next: null };
        const arena = createArena(10, 20);

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameActive = false;
                document.getElementById('over').classList.remove('hidden');
                document.getElementById('final-score').innerText = player.score + " PUNTI";
            }
            drawNext();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            const ms = player.next;
            const size = 20;
            const offX = (nextCanvas.width - ms[0].length * size) / 2;
            const offY = (nextCanvas.height - ms.length * size) / 2;
            ms.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextCtx.fillStyle = colors[value];
                        nextCtx.beginPath();
                        nextCtx.roundRect(offX + x * size, offY + y * size, size - 2, size - 2, 4);
                        nextCtx.fill();
                    }
                });
            });
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameActive = false;

        function update(time = 0) {
            if (!gameActive) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();

            draw();
            updateParticles();
            requestAnimationFrame(update);
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            // Griglia di sfondo
            context.strokeStyle = "#ffeeef";
            for(let x=0; x<canvas.width; x+=grid) { context.strokeRect(x, 0, 0.1, canvas.height); }
            for(let y=0; y<canvas.height; y+=grid) { context.strokeRect(0, y, canvas.width, 0.1); }
            
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function updateScore() {
            document.getElementById('sc').innerText = player.score;
            const level = Math.floor(player.score / 500) + 1;
            document.getElementById('lv').innerText = level;
            dropInterval = Math.max(100, 1000 - (level * 80));
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.next = null;
            gameActive = true;
            document.getElementById('over').classList.add('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            playerReset();
            updateScore();
            update();
        }

        document.addEventListener('keydown', event => {
            if (!gameActive) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });

    </script>
</body>
</html>
